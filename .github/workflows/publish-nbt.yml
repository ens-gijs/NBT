name: publish-nbt

# Publishes :nbt to the Sonatype Central Portal whenever a `nbt-vX.Y.Z`
# tag is pushed. The complementary `mca-v*` tag is handled by publish-mca.yml.
# Each module is released independently — see nbt/CHANGELOG.md / nbt-mca/CHANGELOG.md.
#
# Requires the same secrets as publish-snapshot.yml.

on:
  push:
    tags: ['nbt-v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish nbt to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        # publishAndReleaseToMavenCentral uploads the bundle and auto-promotes it
        # (no manual click in the Central Portal UI needed).
        run: ./gradlew :nbt:publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
