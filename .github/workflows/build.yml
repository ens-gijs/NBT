name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history for the version-bump check below to diff against the
          # PR base / previous push.
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Verify version bumps for changed source
        # Convention: if a commit changes `<module>/src/main/**`, the same
        # commit must bump `<module>Version` in gradle.properties to a
        # `-SNAPSHOT`. This keeps gradle.properties as the source of truth
        # for "does this module have unreleased changes?". See CLAUDE.md
        # "Version coupling between :nbt and :nbt-mca".
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="HEAD~1"
          fi
          echo "Comparing HEAD vs $base"

          fail=0
          check_module() {
            local module="$1"
            local key="$2"
            local changed
            changed=$(git diff --name-only "$base"...HEAD -- "${module}/src/main/" "${module}/build.gradle" | wc -l)
            if [ "$changed" -eq 0 ]; then
              echo "✓ ${module}: no source/build changes"
              return 0
            fi
            local v
            v=$(grep "^${key}=" gradle.properties | cut -d= -f2)
            case "$v" in
              *-SNAPSHOT)
                echo "✓ ${module}: ${changed} build-input file(s) changed; ${key}=${v} (-SNAPSHOT — OK)"
                ;;
              *)
                echo "::error::${module}: ${changed} build-input file(s) changed but ${key}=${v} is a release version, not a -SNAPSHOT."
                echo "::error::Bump ${key} in gradle.properties to the next -SNAPSHOT (e.g. ${v}+1-SNAPSHOT) and push again."
                echo "::error::See CLAUDE.md 'Version coupling between :nbt and :nbt-mca'."
                fail=1
                ;;
            esac
          }
          check_module nbt     nbtVersion
          check_module nbt-mca mcaVersion
          exit $fail

      - name: Build & test
        run: ./gradlew build --stacktrace
