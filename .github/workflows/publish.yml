name: publish

# Publishes to the Sonatype Central Portal whenever a vX.Y.Z tag is pushed.
# Requires these repository secrets to be set:
#   MAVEN_CENTRAL_USERNAME            — Central Portal user token name
#   MAVEN_CENTRAL_PASSWORD            — Central Portal user token password
#   SIGNING_IN_MEMORY_KEY             — armored GPG private key
#   SIGNING_IN_MEMORY_KEY_ID          — last 8 hex chars of the key ID
#   SIGNING_IN_MEMORY_KEY_PASSWORD    — GPG passphrase

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        # publishAndReleaseToMavenCentral uploads the bundle and auto-promotes it
        # (no manual click in the Central Portal UI needed).
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
