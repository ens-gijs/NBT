name: publish-snapshot

# Publishes -SNAPSHOT builds of BOTH modules (nbt-core, nbt-mca) to the
# Sonatype Central snapshot repo on every push to master that touches build
# inputs. The Central snapshot repo is mutable, so re-uploading an unchanged
# module is a cheap no-op for consumers — keeping this simple ("publish all,
# always") instead of per-module path-filtering.
#
# Each subproject's version is gated independently in its own pre-publish
# check: a module gets skipped (with a notice annotation) if its version is
# not -SNAPSHOT — that happens during a release commit when the released
# module's version is temporarily the bare X.Y.Z form.
#
# Requires these repository secrets:
#   MAVEN_CENTRAL_USERNAME            — Central Portal user token name
#   MAVEN_CENTRAL_PASSWORD            — Central Portal user token password
#   SIGNING_IN_MEMORY_KEY             — armored GPG private key
#   SIGNING_IN_MEMORY_KEY_ID          — last 8 hex chars of the key ID
#   SIGNING_IN_MEMORY_KEY_PASSWORD    — GPG passphrase

on:
  push:
    branches: [master]
    paths:
      - 'nbt-core/src/main/**'
      - 'nbt-mca/src/main/**'
      - 'nbt-core/build.gradle'
      - 'nbt-mca/build.gradle'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-flight snapshot publish if a newer commit lands — only the
# latest snapshot needs to make it to Central.
concurrency:
  group: publish-snapshot
  cancel-in-progress: true

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Detect per-module SNAPSHOT versions
        # Each module is versioned independently (gradle.properties: coreVersion,
        # mcaVersion). A release commit drops -SNAPSHOT for one module while the
        # other stays on -SNAPSHOT. Skip the publish step for any non-SNAPSHOT
        # module instead of failing the whole workflow — a tagged release is
        # what publishes a non-SNAPSHOT version, never this workflow.
        id: detect
        run: |
          coreV=$(./gradlew -q :nbt-core:properties | awk '/^version: / {print $2}')
          mcaV=$(./gradlew  -q :nbt-mca:properties  | awk '/^version: / {print $2}')
          echo "nbt-core version: $coreV"
          echo "nbt-mca  version: $mcaV"
          if [ -z "$coreV" ] || [ -z "$mcaV" ]; then
            echo "::error::Could not parse project versions from gradle properties."
            exit 1
          fi
          case "$coreV" in
            *-SNAPSHOT) echo "core_is_snapshot=true"  >> "$GITHUB_OUTPUT" ;;
            *) echo "core_is_snapshot=false" >> "$GITHUB_OUTPUT"
               echo "::notice::Skipping nbt-core snapshot publish — version '$coreV' is not a -SNAPSHOT." ;;
          esac
          case "$mcaV" in
            *-SNAPSHOT) echo "mca_is_snapshot=true"  >> "$GITHUB_OUTPUT" ;;
            *) echo "mca_is_snapshot=false" >> "$GITHUB_OUTPUT"
               echo "::notice::Skipping nbt-mca snapshot publish — version '$mcaV' is not a -SNAPSHOT." ;;
          esac

      - name: Publish nbt-core SNAPSHOT to Maven Central
        if: steps.detect.outputs.core_is_snapshot == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        # publishToMavenCentral (no AndRelease) is correct for snapshots.
        run: ./gradlew :nbt-core:publishToMavenCentral --no-configuration-cache --stacktrace

      - name: Publish nbt-mca SNAPSHOT to Maven Central
        if: steps.detect.outputs.mca_is_snapshot == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_mavenCentralSigningInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew :nbt-mca:publishToMavenCentral --no-configuration-cache --stacktrace
